<ng-container *ngIf="costToSpend$ | async as cost">
  <div class="cost-to-spend-stats">

    <!-- Parameters: static context, does not react to the feerate slider -->
    <div class="stat-group static">
      <div
        class="group-header text-muted small text-uppercase"
        i18n="address.cost-to-spend.parameters|Cost to spend parameters group"
      >
        Parameters
      </div>
      <div class="stat-items">
        <div class="item">
          <div class="card-text">
            <span
              *ngIf="cost.estimated"
              class="estimate-marker"
              i18n-ngbTooltip="address.cost-to-spend.estimated-tooltip"
              ngbTooltip="Estimated for this script type; actual size varies"
              placement="bottom"
              >~</span
            >{{ cost.inputVsize | number }} <span class="unit">vB</span>
          </div>
          <div class="symbol" i18n="address.cost-to-spend.input-vsize">vsize per input</div>
        </div>
        <div class="item">
          <div class="card-text">{{ utxoCount | number }}</div>
          <div class="symbol" i18n="address.cost-to-spend.utxos">Spendable UTXOs</div>
        </div>
      </div>
    </div>

    <!-- Cost to spend: reacts to the feerate slider -->
    <div class="stat-group">
      <div
        class="group-header text-muted small text-uppercase"
        i18n="address.cost-to-spend.group-cost|Cost to spend group header"
      >
        Cost to spend
      </div>
      <div class="stat-items">
        <div class="item">
          <div class="card-text">
            <app-amount [satoshis]="cost.minCost" [noFiat]="true"></app-amount>
            <span class="fiat"><app-fiat [value]="cost.minCost"></app-fiat></span>
          </div>
          <div
            class="symbol"
            i18n-ngbTooltip="address.cost-to-spend.min-cost-tooltip"
            ngbTooltip="Best case: all UTXOs consolidated into a single transaction, so the per-transaction overhead is shared"
            placement="bottom"
            i18n="address.cost-to-spend.min-cost|Consolidated cost to spend"
          >
            Consolidated
          </div>
        </div>
        <div class="item">
          <div class="card-text">
            <app-amount [satoshis]="cost.maxCost" [noFiat]="true"></app-amount>
            <span class="fiat"><app-fiat [value]="cost.maxCost"></app-fiat></span>
          </div>
          <div
            class="symbol"
            i18n-ngbTooltip="address.cost-to-spend.max-cost-tooltip"
            ngbTooltip="Worst case: each UTXO is spent separately, each in its own transaction with one typical output, so every spend pays full overhead"
            placement="bottom"
            i18n="address.cost-to-spend.max-cost|One by one cost to spend"
          >
            One by one
          </div>
        </div>
      </div>
    </div>

    <!-- Effective balance: reacts to the feerate slider -->
    <div class="stat-group">
      <div
        class="group-header text-muted small text-uppercase"
        i18n="address.cost-to-spend.group-effective-balance|Effective balance group header"
      >
        Effective balance
      </div>
      <div class="stat-items">
        <div class="item">
          <div class="card-text">
            <app-amount [satoshis]="cost.maxEffectiveBalance" [noFiat]="true"></app-amount>
            <span class="fiat"><app-fiat [value]="cost.maxEffectiveBalance"></app-fiat></span>
          </div>
          <div
            class="symbol"
            i18n-ngbTooltip="address.cost-to-spend.at-best-tooltip"
            ngbTooltip="Balance minus the minimum cost to spend (all UTXOs consolidated)"
            placement="bottom"
            i18n="address.cost-to-spend.at-best|Best-case effective balance"
          >
            At best
          </div>
        </div>
        <div class="item">
          <div class="card-text">
            <app-amount [satoshis]="cost.minEffectiveBalance" [noFiat]="true"></app-amount>
            <span class="fiat"><app-fiat [value]="cost.minEffectiveBalance"></app-fiat></span>
          </div>
          <div
            class="symbol"
            i18n-ngbTooltip="address.cost-to-spend.at-worst-tooltip"
            ngbTooltip="Balance minus the maximum cost to spend (each UTXO spent separately)"
            placement="bottom"
            i18n="address.cost-to-spend.at-worst|Worst-case effective balance"
          >
            At worst
          </div>
        </div>
      </div>
    </div>

  </div>
</ng-container>
