<div class="consolidation-chart-wrap">

  <!-- Custom legend -->
  <div class="chart-legend">
    <div class="legend-item">
      <span class="legend-swatch swatch-gradient"></span>
      <span i18n="utxo-spending.chart.historical">Historical median fee</span>
    </div>
    <div class="legend-item">
      <span class="legend-swatch swatch-future" style="background:#E23B6C"></span>
      <span i18n="utxo-spending.chart.future">Projected future fee</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:#00E5BF"></span>
      <span i18n="utxo-spending.chart.now">Now</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background:#E23B6C" [style.background]="futureDotColor"></span>
      <span i18n="utxo-spending.chart.future-scenario">Future scenario</span>
    </div>
    <div class="legend-item">
      <span class="legend-swatch swatch-area-magenta"></span>
      <span i18n="utxo-spending.chart.threshold-exceeded">Fees exceeded your target</span>
    </div>
  </div>

  <!-- Chart -->
  <div
    class="chart"
    *browserOnly
    echarts
    [initOpts]="chartInitOptions"
    [options]="chartOptions"
  ></div>

</div>
